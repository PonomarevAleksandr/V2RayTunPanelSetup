# ═════════════════════════════════════════════════════════════════════════════
# V2RayTun Panel — Production stack
#
# All images are pulled from a private Docker registry.
# Run `docker login docker-registry.v2raytun.com` first (or use v2raytunsetup).
# ═════════════════════════════════════════════════════════════════════════════
services:
  postgres:
    image: postgres:17-alpine
    container_name: v2raytunpanel-postgres
    restart: unless-stopped
    # Raise max_connections so multiple backend workers can each hold a larger
    # Prisma pool (connection_limit) without exhausting Postgres under load.
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-v2raytunpanel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-v2raytunpanel}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-v2raytunpanel}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - v2raytunpanel

  redis:
    image: redis:7-alpine
    container_name: v2raytunpanel-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - v2raytunpanel

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: v2raytunpanel-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-v2raytunpanel}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?Set RABBITMQ_PASSWORD in .env}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-v2raytunpanel}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - v2raytunpanel

  backend:
    image: ${REGISTRY:-docker-registry.v2raytun.com}/v2raytunpanel-panel:${VERSION:-latest}
    container_name: v2raytunpanel-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      APP_PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-v2raytunpanel}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-v2raytunpanel}?schema=public&connection_limit=${DB_CONNECTION_LIMIT:-15}&pool_timeout=20
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-v2raytunpanel}:${RABBITMQ_PASSWORD}@rabbitmq:5672/${RABBITMQ_VHOST:-v2raytunpanel}
      JWT_AUTH_SECRET: ${JWT_AUTH_SECRET:?Set JWT_AUTH_SECRET in .env}
      JWT_API_TOKENS_SECRET: ${JWT_API_TOKENS_SECRET:?Set JWT_API_TOKENS_SECRET in .env}
      SUB_PUBLIC_DOMAIN: ${SUB_PUBLIC_DOMAIN:-localhost/api/sub}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      API_INSTANCES: ${API_INSTANCES:-max}
      WORKER_INSTANCES: ${WORKER_INSTANCES:-2}
      NODE_IMAGE_SOURCE: ${NODE_IMAGE_SOURCE:-registry}
      NODE_DOCKER_IMAGE: ${NODE_DOCKER_IMAGE:-}
      SUBSCRIPTION_PAGE_URL: ${SUBSCRIPTION_PAGE_URL:-/sub}
    ports:
      - "127.0.0.1:${BACKEND_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - v2raytunpanel

  frontend:
    image: ${REGISTRY:-docker-registry.v2raytun.com}/v2raytunpanel-frontend:${VERSION:-latest}
    container_name: v2raytunpanel-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - v2raytunpanel

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  v2raytunpanel:
    driver: bridge
